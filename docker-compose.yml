services:
  tidal-stream:
    build:
      context: .
    image: tidal-stream-research:latest
    environment:
      MPLBACKEND: Agg
      TIDAL_STREAM_PLOT: "0"
      TIDAL_STREAM_OUTPUT: outputs/tidal_stream.png
    volumes:
      - ./outputs:/workspace/outputs
    command: python agama_stream_sim/example_tidal_stream.py
